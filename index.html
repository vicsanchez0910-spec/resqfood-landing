<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ResQFood</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7f5;
}

header{
    background:linear-gradient(135deg,#0c5b35,#1f8a57);
    color:white;
    padding:50px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:3rem;
}

header p{
    font-size:1.2rem;
}

.section-title{
    text-align:center;
    margin:40px 0;
    color:#0c5b35;
}

.carousel-container{

    width:90%;
    max-width:1100px;

    height:650px;

    margin:auto;

    position:relative;

    overflow:hidden;

    border-radius:20px;

    background:white;

    box-shadow:0px 5px 20px rgba(0,0,0,.15);

}

.slide{

    width:100%;
    height:100%;

    display:none;

}

.slide.active{

    display:block;

}

.slide img{

    width:100%;
    height:100%;

    object-fit:contain;

    object-position:top center;

}


/* Botones */

.arrow{

position:absolute;

top:50%;

transform:translateY(-50%);

background:rgba(0,0,0,.6);

color:white;

border:none;

font-size:30px;

width:50px;

height:50px;

border-radius:50%;

cursor:pointer;

z-index:100;

}

.arrow:hover{

background:#0c5b35;

}

.prev{

left:20px;

}

.next{

right:20px;

}


/* Indicadores */

.indicators{

display:flex;

justify-content:center;

margin-top:20px;

gap:8px;

}

.dot{

width:12px;

height:12px;

border-radius:50%;

background:#ccc;

cursor:pointer;

}

.dot.active{

background:#0c5b35;

}


footer{

margin-top:40px;

padding:20px;

background:#0c5b35;

color:white;

text-align:center;

}


@media(max-width:768px){

.carousel-container{

height:400px;

}

header h1{

font-size:2rem;

}

.arrow{

width:40px;
height:40px;
font-size:20px;

}

}

</style>

</head>

<body>

<header>

<h1>ResQFood</h1>

<p>
Donde cada alimento cuenta, cada persona importa
</p>

</header>

<h2 class="section-title">

Reporte e impacto del proyecto

</h2>


<div class="carousel-container">

<button class="arrow prev">&#10094;</button>

<button class="arrow next">&#10095;</button>


<div class="slide active">
<img src="imagenes/img1.png">
</div>

<div class="slide">
<img src="imagenes/img2.png">
</div>

<div class="slide">
<img src="imagenes/img3.png">
</div>

<div class="slide">
<img src="imagenes/img4.png">
</div>

<div class="slide">
<img src="imagenes/img5.png">
</div>

<div class="slide">
<img src="imagenes/img6.png">
</div>

<div class="slide">
<img src="imagenes/img7.png">
</div>

<div class="slide">
<img src="imagenes/img8.png">
</div>

<div class="slide">
<img src="imagenes/img9.png">
</div>

<div class="slide">
<img src="imagenes/img10.png">
</div>

<div class="slide">
<img src="imagenes/img11.png">
</div>

<div class="slide">
<img src="imagenes/img12.png">
</div>

<div class="slide">
<img src="imagenes/img13.png">
</div>

<div class="slide">
<img src="imagenes/img14.png">
</div>

<div class="slide">
<img src="imagenes/img15.png">
</div>

<div class="slide">
<img src="imagenes/img16.png">
</div>

<div class="slide">
<img src="imagenes/img17.png">
</div>

<div class="slide">
<img src="imagenes/img18.png">
</div>

<div class="slide">
<img src="imagenes/img19.png">
</div>

<div class="slide">
<img src="imagenes/img20.png">
</div>

</div>

<div class="indicators"></div>

<footer>

© 2026 ResQFood | Tecnología con impacto social

</footer>


<script>

const slides=document.querySelectorAll(".slide");

const indicators=document.querySelector(".indicators");

let current=0;


slides.forEach((slide,index)=>{

let dot=document.createElement("div");

dot.classList.add("dot");

if(index===0){

dot.classList.add("active");

}

dot.onclick=()=>showSlide(index);

indicators.appendChild(dot);

});


const dots=document.querySelectorAll(".dot");


function showSlide(index){

slides[current].classList.remove("active");

dots[current].classList.remove("active");

current=index;

slides[current].classList.add("active");

dots[current].classList.add("active");

}


document.querySelector(".next")
.addEventListener("click",()=>{

let next=current+1;

if(next>=slides.length){

next=0;

}

showSlide(next);

});


document.querySelector(".prev")
.addEventListener("click",()=>{

let prev=current-1;

if(prev<0){

prev=slides.length-1;

}

showSlide(prev);

});

</script>

</body>
</html>
