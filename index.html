<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ResQFood</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,#006633,#00994d);

color:white;

overflow-x:hidden;

}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.logo{

font-size:70px;
font-weight:bold;
margin-bottom:20px;

}

.hero h2{

font-size:30px;

max-width:900px;

margin-bottom:40px;

}

.btn{

padding:15px 35px;

border-radius:30px;

background:#ff7b00;

color:white;

font-size:18px;

text-decoration:none;

font-weight:bold;

transition:.3s;

}

.btn:hover{

transform:scale(1.1);

}

.section{

padding:50px 20px;
text-align:center;

}

.slider-container{

position:relative;

width:90%;

max-width:1200px;

margin:auto;

}

.slide{

display:none;

animation:fade .5s;

}

.slide img{

width:100%;

border-radius:20px;

box-shadow:

0 10px 40px rgba(0,0,0,.5);

}

.active{

display:block;

}

.prev,.next{

position:absolute;

top:50%;

transform:translateY(-50%);

font-size:40px;

cursor:pointer;

padding:20px;

background:rgba(0,0,0,.4);

border-radius:50%;

}

.prev{

left:-60px;

}

.next{

right:-60px;

}

@keyframes fade{

from{

opacity:0;

transform:scale(.95);

}

to{

opacity:1;

transform:scale(1);

}

}

.counter{

margin-top:20px;

font-size:20px;

}

footer{

margin-top:80px;

padding:30px;

background:#003d1f;

text-align:center;

}

@media(max-width:768px){

.prev{

left:5px;

}

.next{

right:5px;

}

.logo{

font-size:50px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="logo">

ResQFood

</div>

<h2>

Transformamos excedentes alimentarios
en oportunidades reales para quienes
más lo necesitan.

</h2>

<a href="#proyecto" class="btn">

Explorar Proyecto

</a>

</section>

<section id="proyecto" class="section">

<h1>

Reporte de Impacto y Proyecto

</h1>

<br><br>

<div class="slider-container">

<div class="slide active"><img src="images/1.png"></div>
<div class="slide"><img src="images/2.png"></div>
<div class="slide"><img src="images/3.png"></div>
<div class="slide"><img src="images/4.png"></div>
<div class="slide"><img src="images/5.png"></div>
<div class="slide"><img src="images/6.png"></div>
<div class="slide"><img src="images/7.png"></div>
<div class="slide"><img src="images/8.png"></div>
<div class="slide"><img src="images/9.png"></div>
<div class="slide"><img src="images/10.png"></div>
<div class="slide"><img src="images/11.png"></div>
<div class="slide"><img src="images/12.png"></div>
<div class="slide"><img src="images/13.png"></div>
<div class="slide"><img src="images/14.png"></div>
<div class="slide"><img src="images/15.png"></div>
<div class="slide"><img src="images/16.png"></div>
<div class="slide"><img src="images/17.png"></div>
<div class="slide"><img src="images/18.png"></div>
<div class="slide"><img src="images/19.png"></div>
<div class="slide"><img src="images/20.png"></div>

<div class="prev" onclick="changeSlide(-1)">
❮
</div>

<div class="next" onclick="changeSlide(1)">
❯
</div>

<div class="counter">

<span id="current">

1

</span>

/

20

</div>

</div>

</section>

<footer>

ResQFood © 2026

</footer>

<script>

let slides=
document.querySelectorAll(".slide");

let current=0;

function showSlide(n){

slides[current]
.classList.remove("active");

current=
(current+n+slides.length)
%slides.length;

slides[current]
.classList.add("active");

document
.getElementById(
"current"
).innerText=current+1;

}

function changeSlide(n){

showSlide(n);

}

setInterval(()=>{

showSlide(1);

},5000);

</script>

</body>

</html>
