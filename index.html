<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>ResQFood</title>

<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#f6f6f6;
scroll-behavior:smooth;

}

.hero{

height:100vh;

display:flex;
flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

background:linear-gradient(
135deg,
#006633,
#00a651
);

color:white;

padding:20px;

}

.hero h1{

font-size:60px;
margin:0;

}

.hero p{

font-size:24px;

max-width:800px;

}

.button{

margin-top:30px;

padding:15px 35px;

background:#ff7a00;

border-radius:10px;

text-decoration:none;

color:white;

font-size:20px;

font-weight:bold;

}

.section{

padding:40px;

}

.gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(500px,1fr));

gap:25px;

}

.gallery img{

width:100%;

border-radius:15px;

box-shadow:
0 5px 15px rgba(0,0,0,.2);

transition:.3s;

}

.gallery img:hover{

transform:scale(1.02);

}

footer{

background:#006633;

padding:30px;

text-align:center;

color:white;

margin-top:40px;

}
